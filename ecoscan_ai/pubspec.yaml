name: ecoscan_ai
description: "EcoScan AI - Phân tích sản phẩm bền vững bằng AI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1

  # Navigation
  go_router: ^14.8.1

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.5

  # Scanning
  mobile_scanner: ^6.0.5
  google_mlkit_text_recognition: ^0.13.1

  # Networking
  http: ^1.4.0
  cached_network_image: ^3.4.1

  # Charts
  fl_chart: ^0.71.0

  # UI
  google_fonts: ^6.2.1
  lottie: ^3.3.1

  # Utilities
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/animations/
    - assets/images/
